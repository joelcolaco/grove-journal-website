name: Feature request
description: Suggest an idea or improvement for Grove Journal.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please keep examples general and avoid including private journal entries.

  - type: textarea
    id: problem
    attributes:
      label: What would you like Grove Journal to help with?
      description: Describe the need, frustration, or workflow behind the idea.
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement.
      placeholder: It would be helpful if Grove Journal could...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
        - Not sure
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Writing entries
        - Mood tracking
        - Journal history
        - Search
        - Calendar/date browsing
        - Reminders
        - Backup and restore
        - Export/import
        - Premium
        - Language/localization
        - Other
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: If there is another way you handle this today, share it here.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Add any extra context or examples.
    validations:
      required: false
